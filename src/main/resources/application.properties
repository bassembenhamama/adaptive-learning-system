# ============================================================
# Adaptive Learning System — Application Configuration
# ============================================================

spring.application.name=adaptive-learning-system

# --- Database Connection ---
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/adaptive_learning_db?createDatabaseIfNotExist=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy

# --- Server ---
server.port=8080

# --- File Uploads ---
spring.servlet.multipart.max-file-size=-1
spring.servlet.multipart.max-request-size=-1
app.upload.dir=./uploads

# --- Security ---
app.jwt.secret=${JWT_SECRET:thisIsAVerySecureAndLongSecretKeyForAuth123!@#}
app.jwt.expiration-ms=86400000