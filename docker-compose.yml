version: '3.9'
services:
  app:
    build: .
    image: als-colearn:latest
    ports:
      - "8080:8080"
    environment:
      - DB_URL=jdbc:mysql://db:3306/adaptive_learning_db?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - APP_UPLOAD_DIR=/app/uploads
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}
    volumes:
      - uploads-data:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    networks:
      - als-network
    restart: unless-stopped

  db:
    image: mysql:8.0
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: adaptive_learning_db
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", 
             "-p${DB_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - als-network
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage:z
    networks:
      - als-network
    restart: unless-stopped

volumes:
  db-data:
  uploads-data:
  qdrant-data:

networks:
  als-network:
    driver: bridge
