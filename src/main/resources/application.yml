spring:
  profiles:
    active: local
  application:
    name: adaptive-learning-system
  servlet:
    multipart:
      max-file-size: -1
      max-request-size: -1
  jpa:
    hibernate:
      naming:
        physical-strategy: org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
    open-in-view: false
  # Task 4-G — Explicit async thread pool (prevents unbounded thread creation under load)
  # Named threads (als-async-N) make stack traces immediately identifiable in logs.
  task:
    execution:
      pool:
        core-size: 4
        max-size: 16
        queue-capacity: 100
        keep-alive: 60s
      thread-name-prefix: als-async-

server:
  port: 8080
  error:
    include-stacktrace: never
    include-message: never

app:
  jwt:
    secret: ${JWT_SECRET:thisIsAVerySecureAndLongSecretKeyForAuth123!@#}
    expiration-ms: 86400000
  upload:
    dir: ${APP_UPLOAD_DIR:./uploads}
  security:
    cors:
      allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
    # Task 1-A: set COOKIE_SECURE=true in production (HTTPS only)
    cookie:
      secure: ${COOKIE_SECURE:false}

ai:
  enabled: ${AI_ENABLED:false}
  gemini:
    api-key: ${GEMINI_API_KEY:}
    embedding-model: text-embedding-004
    chat-model: gemini-3-flash-preview
    max-tokens: 1000
    temperature: 0.3
  qdrant:
    host: ${QDRANT_HOST:localhost}
    port: ${QDRANT_PORT:6334} # gRPC port
    collection: ${QDRANT_COLLECTION:als_documents}
  rag:
    chunk-size: 2000 # ~512 tokens
    chunk-overlap: 200
    top-k: 5
